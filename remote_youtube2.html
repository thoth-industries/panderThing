<!doctype html>
<html>
    <head>
    </head>
    <body style="margin:0; padding:0;">

<div id="video-player" style="margin:0; padding:0;"></div>




<script>
        // 1. Get the query string from the current URL
const queryString = window.location.search;

// 2. Create a URLSearchParams object
const urlParams = new URLSearchParams(queryString);

// 3. Retrieve the values for 'v' and 'p'
const v_value = urlParams.get('v');
const p_value = urlParams.get('p');

// Display the results
console.log(`Value of 'v': ${v_value}`); // Output: Value of 'v': 123
console.log(`Value of 'p': ${p_value}`); // Output: Value of 'p': hello

// You can also check if a parameter exists using .has()
if (urlParams.has('v') && urlParams.has('p')) {
    console.log('Parameter "v" exists.');
    showVideo(v_value, p_value);
}

function showVideo(videoId, playlistId) {
 // const wrapper = document.getElementById('video-wrapper');
  const player = document.getElementById('video-player');
  
  // Added &mute=1 to ensure autoplay works in local file environments
  // https://www.youtube.com/embed/VIDEO_ID?list=PLAYLIST_ID 
  const embedUrl = `https://www.youtube.com/embed/${videoId}?list=${playlistId}&&mute=0&referrerpolicy="no-referrer-when-downgrade" `;
  
  // Added 'allow' attributes which are often required for iframe features locally
  player.innerHTML = `
    <iframe 
      width="300" 
      height="169" 
      src="${embedUrl}" 
      frameborder="0" 
      allow="autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
    </iframe>`;
    
  //wrapper.style.display = 'block';
}

</script>
    </body>
</html>
